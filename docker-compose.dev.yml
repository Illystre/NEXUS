# Development mode: hot reload on both frontend and backend
services:
  backend:
    build: ./backend
    container_name: nexus-backend-dev
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev_secret}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-admin123}
      - DATA_DIR=/data
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nexus-data:/data
    ports:
      - "3010:3001"
    networks:
      - nexus-dev

  frontend:
    build: ./frontend
    container_name: nexus-frontend-dev
    restart: unless-stopped
    ports:
      - "9090:80"
    depends_on:
      - backend
    networks:
      - nexus-dev

networks:
  nexus-dev:
    driver: bridge

volumes:
  nexus-data:
